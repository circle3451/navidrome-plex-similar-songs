version: "3"

vars:
  PLUGIN_NAME: plex-similar-songs

tasks:
  default:
    desc: Build the plugin wasm
    cmds:
      - task: build

  build:
    desc: Compile the plugin to WebAssembly
    sources:
      - main.go
      - go.mod
    generates:
      - plugin.wasm
    env:
      GOROOT: /opt/homebrew/opt/go@1.24/libexec
      PATH: /opt/homebrew/opt/go@1.24/bin:{{.PATH}}
    cmds:
      - tinygo build -o plugin.wasm -target wasip1 -buildmode=c-shared .

  package:
    desc: Build and package as .ndp plugin
    deps:
      - build
    generates:
      - "{{.PLUGIN_NAME}}.ndp"
    cmds:
      - zip -j {{.PLUGIN_NAME}}.ndp manifest.json plugin.wasm

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f plugin.wasm {{.PLUGIN_NAME}}.ndp

  deps:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy
